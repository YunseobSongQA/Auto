<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automation Portfolio — QASS 자동화 4종</title>
  <meta name="description" content="하나의 타깃(QASS)을 Playwright·Selenium·Appium·API 4가지 도구로 자동화한 포트폴리오." />
  <link rel="stylesheet" href="styles.css" />

<body>
